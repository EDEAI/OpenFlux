<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <script>
        // 从 localStorage 或 URL 参数继承主窗口主题
        (function() {
            var params = new URLSearchParams(window.location.search);
            var theme = params.get('theme') || localStorage.getItem('openflux-theme') || 'dark';
            if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
        })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>预览</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--color-bg-primary, #1a1a2e);
            color: var(--color-text, #e0e0e0);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        #preview-app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--color-border, rgba(255, 255, 255, 0.06));
        }

        /* 自定义标题栏 */
        .preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px 0 14px;
            height: 38px;
            min-height: 38px;
            border-bottom: 1px solid var(--color-border, rgba(255, 255, 255, 0.06));
            background: var(--color-bg-secondary, #16213e);
            flex-shrink: 0;
            user-select: none;
            cursor: default;
        }

        .preview-title {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex: 1;
        }

        .preview-icon {
            font-size: 15px;
            flex-shrink: 0;
        }

        .preview-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--color-text, #ccc);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .preview-size {
            font-size: 10px;
            color: var(--color-text-secondary, #777);
            background: var(--color-bg-tertiary, rgba(255, 255, 255, 0.06));
            padding: 1px 7px;
            border-radius: 8px;
            flex-shrink: 0;
            margin-left: 6px;
        }

        .preview-actions {
            display: flex;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }

        /* 功能按钮 */
        .preview-actions .icon-btn-sm {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--color-text-secondary, #888);
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.15s, color 0.15s;
        }

        .preview-actions .icon-btn-sm:hover {
            background: var(--color-bg-tertiary, rgba(255, 255, 255, 0.08));
            color: var(--color-text, #ddd);
        }

        /* 窗口控制按钮 */
        .win-controls {
            display: flex;
            align-items: center;
            margin-left: 8px;
        }

        .win-btn {
            width: 32px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--color-text-secondary, #777);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .win-btn:hover {
            background: var(--color-bg-tertiary, rgba(255, 255, 255, 0.08));
            color: var(--color-text, #ddd);
        }

        .win-btn.close-btn:hover {
            background: #e81123;
            color: #fff;
        }

        .win-btn svg {
            width: 10px;
            height: 10px;
        }

        /* 预览内容区 */
        .preview-body {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        .preview-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--color-text-secondary, #666);
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div id="preview-app">
        <div class="preview-header">
            <div class="preview-title">
                <span class="preview-icon" id="p-icon"></span>
                <span class="preview-name" id="p-name">Loading...</span>
                <span class="preview-size" id="p-size"></span>
            </div>
            <div class="preview-actions">
                <button class="icon-btn-sm" id="p-open" title="用默认应用打开">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" />
                        <polyline points="15 3 21 3 21 9" />
                        <line x1="10" y1="14" x2="21" y2="3" />
                    </svg>
                </button>
                <button class="icon-btn-sm" id="p-reveal" title="在文件夹中显示">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" />
                    </svg>
                </button>
                <button class="icon-btn-sm" id="p-copy" title="复制内容">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
                    </svg>
                </button>
            </div>
            <div class="win-controls">
                <button class="win-btn" id="p-minimize" title="最小化">
                    <svg viewBox="0 0 10 1" fill="currentColor">
                        <rect width="10" height="1" />
                    </svg>
                </button>
                <button class="win-btn close-btn" id="p-close" title="关闭">
                    <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2">
                        <line x1="1" y1="1" x2="9" y2="9" />
                        <line x1="9" y1="1" x2="1" y2="9" />
                    </svg>
                </button>
            </div>
        </div>
        <div class="preview-body" id="p-body">
            <div class="preview-loading">Loading...</div>
        </div>
    </div>
    <script type="module" src="/src/preview.ts"></script>
</body>

</html>
